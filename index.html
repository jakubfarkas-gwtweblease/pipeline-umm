<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>SMM Pipeline</title>
<meta name="theme-color" content="#131114" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Pipeline" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background:#0D0C0F; height:100%; overflow:hidden; }
  body { overscroll-behavior-y: none; position: fixed; inset: 0; width: 100%; }
  #root { position: absolute; inset: 0; overflow: hidden; }
  .scrollpane { position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  @keyframes riseIn { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop { 0% { transform: scale(0.92); } 60% { transform: scale(1.04); } 100% { transform: scale(1); } }
  .rise { opacity: 0; animation: riseIn 480ms cubic-bezier(.2,.8,.2,1) forwards; animation-delay: calc(var(--i, 0) * 60ms); }
  .slide-anim { animation: slideUp 250ms cubic-bezier(.2,.8,.2,1); }
  .fade-anim { animation: fadeIn 200ms ease; }
  .pop-anim { animation: pop 200ms ease; }
  .jpress { transition: transform 110ms ease, opacity 140ms ease, background 150ms ease, color 150ms ease, border-color 150ms ease, box-shadow 150ms ease; }
  .jpress:active { transform: scale(0.96); }
  .jfocus:focus { border-color: rgba(217,164,65,0.6) !important; box-shadow: 0 0 0 3px rgba(217,164,65,0.14); }
  .hscroll { overflow-x:auto; white-space:nowrap; -webkit-overflow-scrolling: touch; scrollbar-width:none; }
  .hscroll::-webkit-scrollbar { display:none; }
  @media (prefers-reduced-motion: reduce) {
    .jpress { transition: none !important; }
    .rise, .slide-anim, .fade-anim, .pop-anim { animation: none !important; opacity: 1 !important; transform: none !important; }
  }
  input, textarea, button, select { font: inherit; }
  button { cursor:pointer; border:none; background:none; }
  a { -webkit-touch-callout: default; }
  input[type="date"] {
    -webkit-appearance: none; appearance: none;
    display: block; min-width: 0; max-width: 100%; width: 100%;
    text-align: left; font-size: 15px; min-height: 46px;
  }
  input[type="date"]::-webkit-date-and-time-value { text-align: left; margin: 0; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.75); opacity: 0.5; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef } = React;

/* ============ NOIR & BRASS · vlastná identita ============ */
const C = {
  bg: "#131114", bgDeep: "#0D0C0F",
  text: "#EDE8E0",
  dim: "rgba(237,232,224,0.62)",
  faint: "rgba(237,232,224,0.36)",
  card: "rgba(237,232,224,0.045)",
  cardHi: "rgba(237,232,224,0.075)",
  border: "rgba(237,232,224,0.09)",
  track: "rgba(237,232,224,0.08)",
  brass: "#D9A441",
  brassTint: "rgba(217,164,65,0.12)",
  green: "#3ECF8E",
  greenTint: "rgba(62,207,142,0.10)",
  red: "#E25C4A",
  redTint: "rgba(226,92,74,0.09)",
  blue: "#5B9CF6",
  blueTint: "rgba(91,156,246,0.10)",
  slate: "#8A93A6",
  slateTint: "rgba(138,147,166,0.10)",
};
const GRAD_BRASS = "linear-gradient(135deg, #E9BE6B 0%, #C07A28 120%)";
const SERIF = "'Georgia', 'Times New Roman', serif";
const SANS = "-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif";
const MONO = "ui-monospace, 'SF Mono', SFMono-Regular, Menlo, monospace";
const card = (extra = {}) => ({
  background: C.card,
  backdropFilter: "blur(18px) saturate(135%)",
  WebkitBackdropFilter: "blur(18px) saturate(135%)",
  border: `1px solid ${C.border}`,
  ...extra,
});

/* ---------- doména ---------- */
const STATUSES = [
  { k: "Oslovený",   color: C.slate, tint: C.slateTint },
  { k: "Odpovedal",  color: C.blue,  tint: C.blueTint },
  { k: "Stretnutie", color: C.brass, tint: C.brassTint },
  { k: "Klient",     color: C.green, tint: C.greenTint },
  { k: "Nechcel",    color: C.red,   tint: C.redTint },
];
const stOf = (k) => STATUSES.find((s) => s.k === k) || STATUSES[0];
const TYPES = ["Reštaurácia", "Kaviareň", "Bar", "Hotel", "Iné"];
const QUICK_LOG = ["Volal som", "Napísal som", "Stretnutie / call", "Poslal som ponuku"];
const STORAGE_KEY = "smm-pipeline-v1";
const MONTHLY_GOAL = 650; // € / mes

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const pad2 = (n) => String(n).padStart(2, "0");
const localISO = (d) => `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
const todayISO = () => localISO(new Date());
const nowStamp = () => { const d = new Date(); return `${localISO(d)} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`; };
const shortDate = (iso) => { if (!iso) return ""; const [, m, d] = iso.split("-"); return `${parseInt(d)}.${parseInt(m)}.`; };
const DAYS_SK = ["Ne", "Po", "Ut", "St", "Št", "Pi", "So"];
const telHref = (p) => "tel:" + (p || "").replace(/[^\d+]/g, "");
const smsHref = (p) => "sms:" + (p || "").replace(/[^\d+]/g, "");
const extURL = (u) => { if (!u) return ""; return /^https?:\/\//i.test(u) ? u : "https://" + u; };
const fmtEur = (n) => { const v = parseFloat(String(n).replace(",", ".")); return isNaN(v) ? 0 : v; };

const emptyClient = () => ({
  id: uid(),
  name: "", type: "Reštaurácia", person: "",
  phone: "", email: "", ig: "", fb: "",
  firstContact: todayISO(),
  status: "Oslovený",
  note: "",
  nextText: "", nextDate: "",
  price: "", commission: "", clientSince: "",
  log: [],
});

/* ---------- úložisko ---------- */
const loadData = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const d = JSON.parse(raw); if (d && Array.isArray(d.clients)) return d; }
  } catch (e) {}
  return { clients: [] };
};
const saveData = (d) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); return true; }
  catch (e) { return false; }
};

/* count-up */
const useCountUp = (target, dur = 700) => {
  const [v, setV] = useState(0);
  useEffect(() => {
    if (target === null || target === undefined || isNaN(target)) { setV(0); return; }
    let raf, start;
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min(1, (ts - start) / dur);
      setV(Math.round(target * (1 - Math.pow(1 - p, 3))));
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return v;
};

/* ---------- primitívy ---------- */
const Chip = ({ active, onClick, children, color = C.brass, small }) => (
  <button onClick={onClick} className="jpress"
    style={{
      display: "inline-block", borderRadius: 999, marginRight: 7, marginBottom: 7,
      padding: small ? "6px 12px" : "8px 15px", fontSize: small ? 12 : 13.5,
      fontFamily: SANS, fontWeight: active ? 650 : 440,
      color: active ? "#15120B" : C.dim,
      background: active ? color : C.card,
      border: `1px solid ${active ? "transparent" : C.border}`,
      boxShadow: active ? `0 3px 14px ${color}40` : "none",
      whiteSpace: "nowrap",
    }}>
    {children}
  </button>
);

const Field = ({ label, children }) => (
  <div style={{ marginBottom: 18 }}>
    <div style={{ fontSize: 10.5, textTransform: "uppercase", marginBottom: 7, color: C.faint, letterSpacing: "0.13em", fontFamily: SANS }}>{label}</div>
    {children}
  </div>
);

const Input = ({ mono, style, ...props }) => (
  <input {...props} className="jfocus"
    style={{ ...card(), width: "100%", padding: "12px 15px", borderRadius: 13, fontSize: 16, color: C.text, fontFamily: mono ? MONO : SANS, outline: "none", ...style }} />
);

const TextArea = (props) => (
  <textarea {...props} className="jfocus"
    style={{ ...card(), width: "100%", padding: "12px 15px", borderRadius: 13, fontSize: 16, color: C.text, fontFamily: SANS, outline: "none", resize: "vertical" }} />
);

const StatusPill = ({ k }) => {
  const s = stOf(k);
  return (
    <span style={{ padding: "3px 9px", borderRadius: 999, fontWeight: 700, fontSize: 10.5, fontFamily: SANS,
      color: s.color, background: s.tint, border: `1px solid ${s.color}44`, whiteSpace: "nowrap" }}>
      {k}
    </span>
  );
};

/* malé akčné ikonky (volať / sms / mail / kopírovať / ig / fb) */
const ActBtn = ({ href, onClick, children, color = C.dim, title }) => {
  const inner = (
    <span className="jpress" title={title}
      style={{ display: "inline-flex", alignItems: "center", justifyContent: "center",
        minWidth: 38, height: 38, padding: "0 10px", borderRadius: 12,
        background: C.card, border: `1px solid ${C.border}`, color, fontSize: 14.5, fontFamily: SANS, fontWeight: 600,
        textDecoration: "none" }}>
      {children}
    </span>
  );
  if (href) return <a href={href} target={href.startsWith("http") ? "_blank" : undefined} rel="noreferrer" style={{ textDecoration: "none" }} onClick={(e) => e.stopPropagation()}>{inner}</a>;
  return <button onClick={(e) => { e.stopPropagation(); onClick && onClick(); }} style={{ padding: 0 }}>{inner}</button>;
};

const Background = () => (
  <div style={{ position: "fixed", inset: 0, zIndex: -1, background: `linear-gradient(168deg, ${C.bg} 0%, ${C.bgDeep} 72%, #0A090C 100%)` }}>
    <div style={{ position: "absolute", borderRadius: "50%", width: 430, height: 430, top: -170, right: -160, background: "radial-gradient(circle, rgba(217,164,65,0.10), transparent 65%)" }} />
    <div style={{ position: "absolute", borderRadius: "50%", width: 320, height: 320, bottom: -110, left: -130, background: "radial-gradient(circle, rgba(62,207,142,0.05), transparent 65%)" }} />
  </div>
);

/* ---------- 7-dňový pás úloh ---------- */
const WeekStrip = ({ clients, sel, onSel }) => {
  const t = todayISO();
  const days = useMemo(() => Array.from({ length: 7 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() + i);
    return { iso: localISO(d), dn: DAYS_SK[d.getDay()], n: d.getDate() };
  }), []);
  const countFor = (iso) => clients.filter((c) => c.nextDate === iso && c.status !== "Nechcel").length;
  const overdue = clients.filter((c) => c.nextDate && c.nextDate < t && c.status !== "Nechcel").length;
  return (
    <div className="hscroll" style={{ display: "flex", gap: 7, paddingBottom: 2 }}>
      {overdue > 0 && (
        <button onClick={() => onSel(sel === "overdue" ? null : "overdue")} className="jpress"
          style={{ ...card({ border: `1px solid ${sel === "overdue" ? C.red : "rgba(226,92,74,0.45)"}` }),
            borderRadius: 14, padding: "9px 12px", textAlign: "center", flexShrink: 0,
            background: sel === "overdue" ? C.redTint : C.card }}>
          <div style={{ fontSize: 10, color: C.red, fontFamily: SANS, fontWeight: 700, letterSpacing: "0.06em" }}>PO TERMÍNE</div>
          <div style={{ fontSize: 17, fontWeight: 700, color: C.red, fontFamily: MONO, marginTop: 2 }}>{overdue}</div>
        </button>
      )}
      {days.map((d) => {
        const n = countFor(d.iso);
        const active = sel === d.iso;
        const isToday = d.iso === t;
        return (
          <button key={d.iso} onClick={() => onSel(active ? null : d.iso)} className="jpress"
            style={{ ...card({ border: `1px solid ${active ? C.brass : isToday ? "rgba(217,164,65,0.4)" : C.border}` }),
              borderRadius: 14, padding: "9px 0", width: 52, textAlign: "center", flexShrink: 0,
              background: active ? C.brassTint : C.card }}>
            <div style={{ fontSize: 10, color: isToday ? C.brass : C.faint, fontFamily: SANS, fontWeight: isToday ? 700 : 500 }}>{isToday ? "DNES" : d.dn}</div>
            <div style={{ fontSize: 15, fontWeight: 600, color: C.text, fontFamily: MONO, marginTop: 2 }}>{d.n}</div>
            <div style={{ fontSize: 10.5, fontFamily: MONO, marginTop: 2, color: n > 0 ? C.brass : "transparent", fontWeight: 700 }}>{n > 0 ? n : "·"}</div>
          </button>
        );
      })}
    </div>
  );
};

/* ---------- modal klienta (pridať / upraviť) ---------- */
const ClientModal = ({ initial, onSave, onCancel }) => {
  const [f, setF] = useState(initial || emptyClient());
  const u = (patch) => setF({ ...f, ...patch });
  const ok = f.name.trim();
  const isCustomType = f.type && !TYPES.includes(f.type);
  return (
    <div className="fade-anim" style={{ position: "fixed", inset: 0, zIndex: 60, display: "flex", flexDirection: "column", background: "rgba(13,12,15,0.88)", backdropFilter: "blur(24px)", WebkitBackdropFilter: "blur(24px)" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "max(16px, env(safe-area-inset-top)) 20px 14px" }}>
        <button onClick={onCancel} style={{ color: C.dim, fontFamily: SANS, fontSize: 14 }}>Zrušiť</button>
        <div style={{ color: C.text, fontWeight: 600, fontFamily: SANS, fontSize: 14 }}>{initial ? "Upraviť" : "Nový kontakt"}</div>
        <button onClick={() => ok && onSave(f)} style={{ color: ok ? C.brass : C.faint, fontFamily: SANS, fontSize: 14, fontWeight: 700 }}>Uložiť</button>
      </div>
      <div className="slide-anim" style={{ flex: 1, overflowY: "auto", padding: "8px 20px 40px", fontFamily: SANS }}>
        <Field label="Názov firmy *">
          <Input value={f.name} onChange={(e) => u({ name: e.target.value })} placeholder="Thai Restaurant…" autoFocus={!initial} />
        </Field>
        <Field label="Typ">
          <div>
            {TYPES.map((t) => <Chip key={t} small active={f.type === t} onClick={() => u({ type: t })}>{t}</Chip>)}
            <input value={isCustomType ? f.type : ""} onChange={(e) => u({ type: e.target.value })} placeholder="iný…"
              className="jfocus"
              style={{ ...card(), display: "inline-block", padding: "6px 12px", borderRadius: 999, fontSize: 12, marginBottom: 7, color: C.text, fontFamily: SANS, outline: "none", width: 96 }} />
          </div>
        </Field>
        <Field label="Kontaktná osoba">
          <Input value={f.person} onChange={(e) => u({ person: e.target.value })} placeholder="pán Hašta…" />
        </Field>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <Field label="Telefón"><Input value={f.phone} onChange={(e) => u({ phone: e.target.value })} mono inputMode="tel" placeholder="+421…" /></Field>
          <Field label="E-mail"><Input value={f.email} onChange={(e) => u({ email: e.target.value })} inputMode="email" placeholder="info@…" /></Field>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <Field label="Instagram (odkaz)"><Input value={f.ig} onChange={(e) => u({ ig: e.target.value })} placeholder="instagram.com/…" /></Field>
          <Field label="Facebook (odkaz)"><Input value={f.fb} onChange={(e) => u({ fb: e.target.value })} placeholder="facebook.com/…" /></Field>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <Field label="Prvý kontakt"><Input type="date" value={f.firstContact} onChange={(e) => u({ firstContact: e.target.value })} /></Field>
          <Field label="Status">
            <select value={f.status} onChange={(e) => {
                const v = e.target.value;
                u({ status: v, clientSince: v === "Klient" && !f.clientSince ? todayISO() : f.clientSince });
              }}
              className="jfocus"
              style={{ ...card(), width: "100%", padding: "12px 13px", borderRadius: 13, fontSize: 15, color: C.text, fontFamily: SANS, outline: "none", WebkitAppearance: "none", minHeight: 46 }}>
              {STATUSES.map((s) => <option key={s.k} value={s.k} style={{ color: "#000" }}>{s.k}</option>)}
            </select>
          </Field>
        </div>
        <Field label="Ďalší krok — čo treba urobiť">
          <Input value={f.nextText} onChange={(e) => u({ nextText: e.target.value })} placeholder="Zavolať späť, poslať ponuku…" />
        </Field>
        <Field label="Ďalší krok — kedy">
          <Input type="date" value={f.nextDate} onChange={(e) => u({ nextDate: e.target.value })} />
        </Field>
        <div style={{ ...card({ border: `1px solid rgba(62,207,142,0.25)` }), borderRadius: 16, padding: "14px 14px 2px", marginBottom: 18 }}>
          <div style={{ fontSize: 10.5, textTransform: "uppercase", color: C.green, letterSpacing: "0.13em", marginBottom: 12, fontFamily: SANS }}>Money · pri klientovi</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Field label="Cena pre klienta € / mes"><Input value={f.price} onChange={(e) => u({ price: e.target.value })} mono inputMode="decimal" placeholder="200" /></Field>
            <Field label="Moja provízia € / mes"><Input value={f.commission} onChange={(e) => u({ commission: e.target.value })} mono inputMode="decimal" placeholder="70" /></Field>
          </div>
          {f.status === "Klient" && (
            <Field label="Klientom od"><Input type="date" value={f.clientSince} onChange={(e) => u({ clientSince: e.target.value })} /></Field>
          )}
        </div>
        <Field label="Poznámka">
          <TextArea rows={3} value={f.note} onChange={(e) => u({ note: e.target.value })} placeholder="Mini poznámky — kto, čo, dojem…" />
        </Field>
      </div>
    </div>
  );
};

/* ---------- hlavná appka ---------- */
const App = () => {
  const [data, setData] = useState(loadData);
  const [saveError, setSaveError] = useState(false);
  const [tab, setTab] = useState("pipeline");
  const [modal, setModal] = useState(null); // null | "new" | client object
  const [expanded, setExpanded] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [fStatus, setFStatus] = useState("Všetci");
  const [fSoc, setFSoc] = useState("Všetko");
  const [daySel, setDaySel] = useState(null);
  const [q, setQ] = useState("");
  const [logDraft, setLogDraft] = useState("");
  const [logEdit, setLogEdit] = useState(null); // {cid, idx, text}
  const [showAllLog, setShowAllLog] = useState(false);
  const [nextDraft, setNextDraft] = useState(null); // {cid, text, date}
  const [copiedInfo, setCopiedInfo] = useState(null); // client id
  const [backupMsg, setBackupMsg] = useState("");
  const fileRef = useRef(null);

  const clients = data.clients;
  const persist = (next) => { setData(next); setSaveError(!saveData(next)); };
  const setClients = (list) => persist({ ...data, clients: list });
  const updateClient = (id, patch) => setClients(clients.map((c) => (c.id === id ? { ...c, ...patch } : c)));

  const addLog = (cl, text) => {
    updateClient(cl.id, { log: [...(cl.log || []), { d: nowStamp(), text }] });
  };
  const updateLogEntry = (cl, idx, text) => {
    const log = [...(cl.log || [])];
    if (!log[idx]) return;
    log[idx] = { ...log[idx], text };
    updateClient(cl.id, { log });
  };
  const deleteLogEntry = (cl, idx) => {
    updateClient(cl.id, { log: (cl.log || []).filter((_, i) => i !== idx) });
  };

  const changeStatus = (cl, k) => {
    const patch = { status: k, log: [...(cl.log || []), { d: nowStamp(), text: `Status → ${k}` }] };
    if (k === "Klient" && !cl.clientSince) patch.clientSince = todayISO();
    updateClient(cl.id, patch);
  };

  const doneNext = (cl) => {
    updateClient(cl.id, {
      nextText: "", nextDate: "",
      log: [...(cl.log || []), { d: nowStamp(), text: `Hotovo: ${cl.nextText}` }],
    });
  };

  /* štatistiky */
  const stats = useMemo(() => {
    const n = clients.length;
    const by = {};
    STATUSES.forEach((s) => { by[s.k] = clients.filter((c) => c.status === s.k).length; });
    const responded = by["Odpovedal"] + by["Stretnutie"] + by["Klient"];
    const active = clients.filter((c) => c.status === "Klient");
    return {
      n, by,
      respRate: n ? Math.round(((responded + by["Nechcel"]) / n) * 100) : null,
      convRate: n ? Math.round((by["Klient"] / n) * 100) : null,
      monthlyCommission: active.reduce((a, c) => a + fmtEur(c.commission), 0),
      monthlyPrice: active.reduce((a, c) => a + fmtEur(c.price), 0),
      activeClients: active,
    };
  }, [clients]);

  const t = todayISO();
  const visible = useMemo(() => {
    let list = [...clients];
    if (q.trim()) {
      const s = q.trim().toLowerCase();
      list = list.filter((c) => [c.name, c.person, c.type, c.note, c.email, c.phone, c.ig, c.fb, c.nextText, c.status]
        .some((v) => (v || "").toLowerCase().includes(s)));
    }
    if (fStatus !== "Všetci") list = list.filter((c) => c.status === fStatus);
    if (fSoc === "Má IG") list = list.filter((c) => c.ig);
    if (fSoc === "Bez IG") list = list.filter((c) => !c.ig);
    if (fSoc === "Má FB") list = list.filter((c) => c.fb);
    if (fSoc === "Bez FB") list = list.filter((c) => !c.fb);
    if (daySel === "overdue") list = list.filter((c) => c.nextDate && c.nextDate < t && c.status !== "Nechcel");
    else if (daySel) list = list.filter((c) => c.nextDate === daySel);
    const rank = (c) => {
      if (!c.nextDate) return 3;
      if (c.nextDate < t) return 0;
      if (c.nextDate === t) return 1;
      return 2;
    };
    list.sort((a, b) => {
      const r = rank(a) - rank(b);
      if (r !== 0) return r;
      if (a.nextDate && b.nextDate && a.nextDate !== b.nextDate) return a.nextDate < b.nextDate ? -1 : 1;
      return (a.name || "").localeCompare(b.name || "", "sk");
    });
    return list;
  }, [clients, fStatus, fSoc, daySel, t, q]);

  /* záloha */
  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `smm-pipeline-${todayISO()}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    setBackupMsg("Záloha stiahnutá.");
  };
  const importJSON = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const d = JSON.parse(reader.result);
        if (!d || !Array.isArray(d.clients)) return setBackupMsg("Súbor sa nedá prečítať.");
        const map = new Map(clients.map((c) => [c.id, c]));
        d.clients.forEach((c) => map.set(c.id, c));
        setClients([...map.values()]);
        setBackupMsg(`Načítaných ${d.clients.length} kontaktov.`);
      } catch (err) { setBackupMsg("Súbor sa nedá prečítať."); }
    };
    reader.readAsText(f);
    e.target.value = "";
  };

  const copyText = async (txt, label) => {
    try { await navigator.clipboard.writeText(txt); setBackupMsg(label || ("Skopírované: " + txt)); setTimeout(() => setBackupMsg(""), 1800); }
    catch (e) { setBackupMsg("Kopírovanie sa nepodarilo."); }
  };

  /* všetky info o klientovi ako text — na poslanie ďalej */
  const clientInfoText = (cl) => [
    `${cl.name}${cl.type ? ` (${cl.type})` : ""}`,
    cl.person || "",
    cl.ig ? `IG: ${extURL(cl.ig)}` : "",
    cl.fb ? `FB: ${extURL(cl.fb)}` : "",
    cl.phone || "",
    cl.email || "",
  ].filter(Boolean).join("\n");

  /* vizitka vCard → uloženie do kontaktov telefónu */
  const vEsc = (s) => String(s || "").replace(/\\/g, "\\\\").replace(/\n/g, "\\n").replace(/[,;]/g, (m) => "\\" + m);
  const saveVCard = async (cl) => {
    const header = [cl.person, cl.name, `od ${shortDate(cl.firstContact)}`].filter(Boolean).join(" · ");
    const note = [
      cl.type,
      `Status: ${cl.status}`,
      cl.ig ? `IG: ${extURL(cl.ig)}` : "",
      cl.fb ? `FB: ${extURL(cl.fb)}` : "",
      `Prvý kontakt: ${shortDate(cl.firstContact)}`,
      cl.note,
    ].filter(Boolean).join("\n");
    const vcf = [
      "BEGIN:VCARD", "VERSION:3.0",
      `FN:${vEsc(header)}`,
      `N:${vEsc(header)};;;;`,
      cl.name ? `ORG:${vEsc(cl.name)}` : "",
      cl.phone ? `TEL;TYPE=CELL:${cl.phone.replace(/[^\d+]/g, "")}` : "",
      cl.email ? `EMAIL:${cl.email}` : "",
      `NOTE:${vEsc(note)}`,
      "END:VCARD",
    ].filter(Boolean).join("\r\n");
    const fname = `${(cl.name || "kontakt").replace(/\s+/g, "-")}.vcf`;
    const blob = new Blob([vcf], { type: "text/vcard;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    /* share sheet — v rade aplikácií je aj Kontakty (potiahnuť doprava / Viac) */
    try {
      const file = new File([vcf], fname, { type: "text/vcard" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file] });
        setTimeout(() => URL.revokeObjectURL(url), 2000);
        return;
      }
    } catch (e) { if (e && e.name === "AbortError") { setTimeout(() => URL.revokeObjectURL(url), 2000); return; } }
    /* záloha: stiahnutie súboru */
    const a = document.createElement("a");
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    setBackupMsg("Vizitka stiahnutá — otvor ju v Súboroch a ulož kontakt.");
  };

  const dateLabel = useMemo(() => new Date().toLocaleDateString("sk-SK", { weekday: "long", day: "numeric", month: "long" }), []);
  const commissionUp = useCountUp(tab === "money" ? stats.monthlyCommission : 0);

  /* ---------- pipeline ---------- */
  const renderPipeline = () => (
    <div style={{ padding: "0 16px" }}>
      {/* 7-dňový pás */}
      <div className="rise" style={{ "--i": 1, marginBottom: 10 }}>

        {q && (
          <button onClick={() => setQ("")}
            style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", color: C.faint, fontSize: 15, padding: 6 }}>✕</button>

        {STATUSES.map((s) => (
          <Chip key={s.k} small active={fStatus === s.k} color={s.color} onClick={() => setFStatus(fStatus === s.k ? "Všetci" : s.k)}>
            {s.k} <span style={{ fontFamily: MONO, opacity: 0.7 }}>{stats.by[s.k]}</span>

                    background: overdue ? C.red : isToday ? C.brass : C.faint,

                  <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>

                </div>

            </div>

            {open && (
              <div className="fade-anim" style={{ padding: "0 14px 14px", fontFamily: SANS }}>
                {/* akcie: volať / sms / mail+kópia / ig / fb */}
                <div style={{ display: "flex", gap: 7, flexWrap: "wrap", marginBottom: 12 }}>

                    <input value={nextDraft.text} onChange={(e) => setNextDraft({ ...nextDraft, text: e.target.value })}

                    <div style={{ display: "flex", gap: 8 }}>
                      <input type="date" value={nextDraft.date} onChange={(e) => setNextDraft({ ...nextDraft, date: e.target.value })}
                        className="jfocus"
                        style={{ ...card(), flex: 1, padding: "6px 12px", borderRadius: 11, fontSize: 14, color: C.text, fontFamily: SANS, outline: "none", minHeight: 40 }} />
                      <button onClick={() => {

                      </button>
                      <button onClick={() => setNextDraft(null)} className="jpress"

                {cl.status === "Klient" && (fmtEur(cl.price) > 0 || fmtEur(cl.commission) > 0) && (

                {/* denník aktivít */}

                {(cl.log || []).length === 0 && <div style={{ fontSize: 12.5, color: C.faint, marginBottom: 8 }}>Zatiaľ žiadne.</div>}
                {(() => {
                  const logArr = cl.log || [];
                  const rev = logArr.map((l, i) => ({ ...l, _i: i })).reverse();
                  const shown = showAllLog ? rev : rev.slice(0, 12);
                  return shown.map((l) => {

                            <button onClick={() => { updateLogEntry(cl, l._i, logEdit.text.trim() || l.text); setLogEdit(null); }}

                            <button onClick={() => setLogEdit(null)} style={{ color: C.faint, fontSize: 12, padding: "2px 5px" }}>✕</button>

                  <button onClick={() => setModal(cl)} className="jpress" style={{ ...card(), padding: "8px 14px", borderRadius: 11, color: C.text, fontSize: 13 }}>Upraviť</button>
                  {confirmDelete === cl.id ? (

              </div>

      <div style={{ textAlign: "center", fontSize: 11, margin: "12px 0", color: C.faint, fontFamily: MONO }}>

  /* ---------- money + štatistiky ---------- */
  const renderMoney = () => (
    <div style={{ padding: "0 16px" }}>
      <div className="rise" style={{ "--i": 0, ...card({ border: `1px solid rgba(62,207,142,0.3)` }), borderRadius: 22, padding: "22px 18px", marginBottom: 14, textAlign: "center" }}>

        {(() => {

                <span style={{ color: s.color, fontFamily: MONO, fontWeight: 700 }}>{n}<span style={{ color: C.faint, fontWeight: 400 }}> · {pct}%</span></span>
              </div>
              <div style={{ height: 7, borderRadius: 999, overflow: "hidden", background: C.track }}>
                <div style={{ height: "100%", borderRadius: 999, width: `${pct}%`, background: s.color, boxShadow: `0 0 9px ${s.color}50`, transition: "width 500ms ease" }} />
              </div>
            </div>
          );
        })}
        <div style={{ display: "flex", gap: 18, marginTop: 16, paddingTop: 13, borderTop: `1px solid ${C.border}` }}>
          {[
            ["Reagovalo", stats.respRate === null ? "—" : `${stats.respRate}%`, C.blue],
            ["Konverzia → klient", stats.convRate === null ? "—" : `${stats.convRate}%`, C.green],
            ["Oslovených", stats.n, C.text],
          ].map(([l, v, c]) => (
            <div key={l}>
              <div style={{ fontFamily: MONO, fontWeight: 700, fontSize: 17, color: c }}>{v}</div>
              <div style={{ fontSize: 9.5, color: C.faint, textTransform: "uppercase", letterSpacing: "0.08em", fontFamily: SANS, marginTop: 2 }}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="rise" style={{ "--i": 3, display: "flex", gap: 10, marginBottom: 16 }}>
        <button onClick={exportJSON} className="jpress" style={{ ...card(), flex: 1, padding: "13px 0", borderRadius: 14, color: C.text, fontSize: 14, fontWeight: 600, fontFamily: SANS }}>
          Záloha ↓
        </button>
        <button onClick={() => fileRef.current && fileRef.current.click()} className="jpress" style={{ ...card(), flex: 1, padding: "13px 0", borderRadius: 14, color: C.dim, fontSize: 14, fontWeight: 500, fontFamily: SANS }}>
          Načítať zálohu
        </button>
        <input ref={fileRef} type="file" accept=".json,application/json" onChange={importJSON} style={{ display: "none" }} />
      </div>
    </div>
  );

  return (
    <div>
      <Background />
      <div className="scrollpane" style={{ paddingBottom: 120, fontFamily: SANS }}>
        <div style={{ padding: "max(24px, env(safe-area-inset-top)) 16px 14px" }}>
          <div className="rise" style={{ "--i": 0 }}>
            <div style={{ fontSize: 11, textTransform: "uppercase", color: C.faint, letterSpacing: "0.18em", fontFamily: SANS }}>{dateLabel}</div>
            <h1 style={{ fontSize: 30, fontWeight: 500, letterSpacing: "0.01em", color: C.text, fontFamily: SERIF, marginTop: 4 }}>Pipeline</h1>
            <div style={{ width: 42, height: 3, borderRadius: 2, background: GRAD_BRASS, marginTop: 9 }} />
          </div>

          {(backupMsg || saveError) && (
            <div style={{ ...card(saveError ? { border: "1px solid rgba(226,92,74,0.4)" } : {}), marginTop: 12, borderRadius: 15, padding: "11px 14px", fontSize: 13, color: saveError ? C.red : C.dim, display: "flex", justifyContent: "space-between", fontFamily: SANS }}>
              <span>{saveError ? "Nepodarilo sa uložiť — stiahni si zálohu." : backupMsg}</span>
              {!saveError && <button onClick={() => setBackupMsg("")} style={{ color: C.faint }}>✕</button>}
            </div>
          )}

          {/* taby */}
          <div className="rise" style={{ "--i": 1, ...card(), borderRadius: 15, padding: 4, display: "flex", marginTop: 14 }}>
            {[["pipeline", "Pipeline"], ["money", "Money & štatistiky"]].map(([k, label]) => (
              <button key={k} onClick={() => setTab(k)} className="jpress"
                style={{ flex: 1, padding: "10px 0", borderRadius: 12, fontSize: 13.5, fontWeight: 600, fontFamily: SANS,
                  background: tab === k ? GRAD_BRASS : "transparent", color: tab === k ? "#15120B" : C.dim,
                  boxShadow: tab === k ? "0 4px 14px rgba(217,164,65,0.28)" : "none" }}>
                {label}
              </button>
            ))}
          </div>
        </div>

        <div key={tab} className="fade-anim">
          {tab === "money" ? renderMoney() : renderPipeline()}
        </div>
      </div>

      {!modal && (
        <button onClick={() => setModal("new")} className="jpress" aria-label="Pridať kontakt"
          style={{ position: "fixed", bottom: "max(24px, env(safe-area-inset-bottom))", right: 20, width: 60, height: 60, borderRadius: "50%",
            fontSize: 30, fontWeight: 300, background: GRAD_BRASS, color: "#15120B", zIndex: 10,
            boxShadow: "0 10px 26px rgba(217,164,65,0.3), inset 0 1px 0 rgba(255,255,255,0.4)" }}>
          +
        </button>
      )}

      {modal && (
        <ClientModal
          initial={modal === "new" ? null : modal}
          onCancel={() => setModal(null)}
          onSave={(f) => {
            if (modal === "new") {
              const c = { ...f, log: [{ d: nowStamp(), text: "Pridaný do pipeline" }] };
              setClients([c, ...clients]);
            } else {
              updateClient(modal.id, f);
            }
            setModal(null);
          }}
        />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
